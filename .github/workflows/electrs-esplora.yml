# Builds a pre-compiled electrs binary (Blockstream/esplora fork) for
# linux/aarch64 and uploads it as a release asset in this repo. Run this once
# (or whenever the pinned electrs commit changes). CI jobs then download the
# binary and set ELECTRS_EXE to avoid the x86-64 binary that electrsd's
# build.rs downloads automatically.
#
# Requires: Settings → Actions → Workflow permissions → "Read and write permissions"
# (or a fine-grained PAT with contents:write stored as RELEASE_TOKEN secret).

name: Build electrs (esplora) aarch64

on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  ELECTRS_COMMIT: 027e38d3ebc2f85b28ae76f8f3448438ee4fc7b1
  RELEASE_TAG: electrs-bins

jobs:
  build-aarch64:
    name: Build blockstream/electrs
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out blockstream/electrs at pinned commit
        uses: actions/checkout@v4
        with:
          repository: Blockstream/electrs
          ref: ${{ env.ELECTRS_COMMIT }}
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libclang-dev \
            libzmq3-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --locked --release

      - name: Stage binary
        run: |
          mkdir dist
          cp target/release/electrs \
             dist/electrs_aarch64_linux_esplora_${{ env.ELECTRS_COMMIT }}

      # Attach the binary as a persistent release asset so CI can always fetch it.
      # softprops/action-gh-release creates the tag+release if absent and replaces
      # an existing asset of the same name if present.
      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Pre-built electrs binaries (CI use)"
          body: |
            Pre-built electrs binaries for use in CI.

            | Binary | Repo | Commit |
            |--------|------|--------|
            | `electrs_aarch64_linux_esplora_${{ env.ELECTRS_COMMIT }}` | [Blockstream/electrs](https://github.com/Blockstream/electrs/tree/${{ env.ELECTRS_COMMIT }}) | `${{ env.ELECTRS_COMMIT }}` |

            Set `ELECTRS_EXE` to the downloaded path to override electrsd's
            auto-downloaded x86-64 binary on arm64 runners.
          prerelease: true
          files: dist/electrs_aarch64_linux_esplora_${{ env.ELECTRS_COMMIT }}
