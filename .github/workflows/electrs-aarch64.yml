# Test cross-compiling romanz/electrs for aarch64-unknown-linux-gnu using the
# approach documented in doc/install.md: native cargo build with a system
# cross-compiler and rocksdb statically linked (the default).
#
# No `cross` / Docker needed — just install the aarch64 toolchain on the host,
# add the aarch64 Rust target, and invoke cargo with the appropriate env vars.

name: Build electrs aarch64

on:
  workflow_dispatch: {}

env:
  ELECTRS_COMMIT: 35216c6d30148be8e6763d913d437330f431fc03
  TARGET: aarch64-unknown-linux-gnu

jobs:
  build-aarch64:
    name: Cross-compile romanz/electrs for aarch64
    runs-on: ubuntu-latest

    steps:
      - name: Check out romanz/electrs at pinned commit
        uses: actions/checkout@v4
        with:
          repository: romanz/electrs
          ref: ${{ env.ELECTRS_COMMIT }}
          persist-credentials: false

      # As described in doc/install.md § "Preparing for cross compilation":
      # enable the arm64 dpkg architecture, then install the aarch64 C/C++
      # cross-compiler, the arm64 libc headers, and libclang (needed by
      # rust-rocksdb's bindgen step on the host).
      - name: Install cross-compilation dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libclang-dev \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev:arm64

      - name: Install Rust toolchain and aarch64 target
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ env.TARGET }}

      # Static linking (the default) — rocksdb is built from source, so no
      # librocksdb-dev package is needed. The env vars are taken verbatim from
      # doc/install.md § "Cross compilation".
      - name: Cross-compile
        env:
          BINDGEN_EXTRA_CLANG_ARGS: "-target aarch64-linux-gnu"
          RUSTFLAGS: "-C linker=aarch64-linux-gnu-gcc"
        run: cargo build --locked --release --target ${{ env.TARGET }}
