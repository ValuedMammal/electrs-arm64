# Builds a pre-compiled romanz/electrs binary for aarch64-unknown-linux-gnu and
# uploads it as an asset to a dedicated release in this repo.
#
# Uses the native cargo cross-compilation approach from doc/install.md — no
# `cross` / Docker needed.
#
# Requires: Settings → Actions → Workflow permissions → "Read and write permissions"
# (or a fine-grained PAT with contents:write stored as RELEASE_TOKEN secret).

name: Build electrs aarch64

on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  ELECTRS_COMMIT: 35216c6d30148be8e6763d913d437330f431fc03
  TARGET: aarch64-unknown-linux-gnu
  RELEASE_TAG: electrs-bins

jobs:
  build-aarch64:
    name: Cross-compile romanz/electrs for aarch64
    runs-on: ubuntu-latest

    steps:
      - name: Check out romanz/electrs at pinned commit
        uses: actions/checkout@v4
        with:
          repository: romanz/electrs
          ref: ${{ env.ELECTRS_COMMIT }}
          persist-credentials: false

      # As described in doc/install.md § "Preparing for cross compilation":
      # enable the arm64 dpkg architecture, then install the aarch64 C/C++
      # cross-compiler, the arm64 libc headers, and libclang (needed by
      # rust-rocksdb's bindgen step on the host).
      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libclang-dev \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: Install Rust toolchain and aarch64 target
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ env.TARGET }}

      # Static linking (the default) — rocksdb is built from source, so no
      # librocksdb-dev package is needed. The env vars are taken verbatim from
      # doc/install.md § "Cross compilation".
      - name: Cross-compile
        env:
          BINDGEN_EXTRA_CLANG_ARGS: "-target aarch64-linux-gnu"
          RUSTFLAGS: "-C linker=aarch64-linux-gnu-gcc"
        run: cargo build --locked --release --target ${{ env.TARGET }}

      - name: Stage binary
        run: |
          mkdir dist
          cp target/${{ env.TARGET }}/release/electrs \
             dist/electrs_aarch64_linux_${{ env.ELECTRS_COMMIT }}

      - name: Upload workflow artifact (90-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: electrs-aarch64
          path: dist/
          retention-days: 90

      # softprops/action-gh-release creates the tag+release if absent and
      # replaces an existing asset of the same name if present.
      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Pre-built electrs binaries (CI use)"
          body: |
            Pre-built electrs binaries for use in CI.

            | Binary | Repo | Commit |
            |--------|------|--------|
            | `electrs_aarch64_linux_${{ env.ELECTRS_COMMIT }}` | [romanz/electrs](https://github.com/romanz/electrs/tree/${{ env.ELECTRS_COMMIT }}) | `${{ env.ELECTRS_COMMIT }}` |

            Set `ELECTRS_EXE` to the downloaded path to override electrsd's
            auto-downloaded x86-64 binary on arm64 runners.
          prerelease: true
          files: dist/electrs_aarch64_linux_${{ env.ELECTRS_COMMIT }}
